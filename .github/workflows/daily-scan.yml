name: daily-scan

on:
  schedule:
    - cron: "15 22 * * 1-5"    # 22:15 UTC Mon-Fri — after US close year-round
  workflow_dispatch:            # manual trigger from the Actions tab (works on mobile)
  push:
    branches: [main]            # also run on push (bot commits to docs/ don't re-trigger)

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml

      - name: Run scanners
        run: |
          mkdir -p docs
          python scanner.py --html docs/index.html
          python stock_scanner.py --universe all --html docs/stocks.html

      - name: Publish to GitHub Pages branch folder
        run: |
          git config user.name "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          git add docs
          git commit -m "scan $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
